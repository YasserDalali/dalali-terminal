# Used by Dockerfile.redis — tune memory and persistence for portfolio JSON cache
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

maxmemory 256mb
maxmemory-policy allkeys-lru

appendonly yes
appendfsync everysec
dir /data

# Docker network only by default (compose does not publish 6379). Enable requirepass if you expose Redis.
protected-mode no

loglevel notice
